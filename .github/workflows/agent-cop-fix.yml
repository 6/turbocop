name: Agent Cop Fix

permissions:
  contents: write
  actions: read
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      cop:
        description: 'Cop to fix (e.g. Style/NegatedWhile)'
        required: true
        type: string
      backend:
        description: 'Backend family'
        type: choice
        options:
          - auto
          - codex
          - claude
          - minimax
        default: auto
      mode:
        description: 'Mode: fix (fresh) or retry (with prior attempt context)'
        type: choice
        options:
          - fix
          - retry
        default: fix
      issue_number:
        description: 'Optional linked cop tracker issue number'
        required: false
        type: string
      extra_context:
        description: 'Additional instructions for the agent (optional)'
        required: false
        type: string

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
      RUSTFLAGS: -C link-arg=-fuse-ld=mold
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
          persist-credentials: false

      # --- Shared environment setup (Rust, Ruby, mold, corpus) ---
      - uses: ./.github/actions/setup-agent-env
        with:
          rust_components: rustfmt
          install_vendor_gems: 'true'

      # On self-hosted: copy pre-warmed target into job workspace (each job
      # gets its own copy to avoid concurrent cargo lock contention)
      # On GitHub-hosted: use actions/cache to save/restore target/
      - name: Set up cargo cache
        run: |
          if [ -d "/home/runner/cargo-target-seed" ]; then
            echo "Self-hosted runner — seeding target/ from pre-warmed cache"
            cp -al /home/runner/cargo-target-seed target 2>/dev/null || \
              cp -r /home/runner/cargo-target-seed target
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          fi
        id: cargo-cache

      - uses: actions/cache@v5
        if: steps.cargo-cache.outputs.seeded != 'true'
        with:
          path: target
          key: agent-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: agent-target-

      - name: Initialize runtime layout
        run: |
          python3 scripts/workflows/agent_runtime.py agent-cop-fix \
            --runner-temp "${RUNNER_TEMP}" >> "$GITHUB_ENV"

      - name: Compute identifiers
        id: init
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py init \
            --cop "${{ github.event.inputs.cop }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --backend-input "${{ github.event.inputs.backend }}" \
            --run-id "${{ github.run_id }}" \
            >> "$GITHUB_OUTPUT"

      - name: Generate read-only GitHub token
        id: actions-read-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          permission-actions: read
          permission-contents: read
          permission-metadata: read
          permission-pull-requests: read

      - name: Generate bot control token
        id: bot-control-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: 6
          repositories: bot

      # --- Build (before task generation for pre-diagnostic) ---

      - name: Build binary
        run: |
          cargo build 2>&1
          CARGO_INCREMENTAL=1 cargo test --lib --no-run 2>&1

      # --- Task + backend ---

      - name: Generate task prompt
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/dispatch_cops.py task \
            "${{ github.event.inputs.cop }}" \
            --binary target/debug/nitrocop \
            --output "$TASK_FILE"
          echo "=== Task prompt stats ==="
          wc -l "$TASK_FILE"
          grep -c "CODE BUG\|CONFIG/CONTEXT\|CONFIRMED\|NOT REPRODUCED" "$TASK_FILE" || echo "no diagnostics"

          CODE_BUGS=$(grep -c "CODE BUG" "$TASK_FILE" || true)
          CONFIG_ISSUES=$(grep -c "CONFIG/CONTEXT" "$TASK_FILE" || true)
          echo "code_bugs=$CODE_BUGS" >> "$GITHUB_OUTPUT"
          echo "Code bugs: $CODE_BUGS, Config issues: $CONFIG_ISSUES"

          TOKENS=$(python3 scripts/workflows/count_tokens.py "$TASK_FILE")
          echo "tokens=$TOKENS" >> "$GITHUB_OUTPUT"
          echo "Tokens: $TOKENS"
        id: task

      - name: Select backend
        if: steps.task.outputs.code_bugs != '0'
        id: selected_backend
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py select-backend \
            --cop "${{ github.event.inputs.cop }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --backend-input "${{ github.event.inputs.backend }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --binary target/debug/nitrocop \
            >> "$GITHUB_OUTPUT"

      - name: Resolve backend config
        if: steps.task.outputs.code_bugs != '0'
        id: backend
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py resolve-backend \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            >> "$GITHUB_OUTPUT"

      # --- Skip / Claim / Prompt ---

      - name: Skip if already fixed
        if: steps.task.outputs.code_bugs == '0'
        run: |
          REQUEST_DIR="$RUNNER_TEMP/cop-fix-skip-request"
          python3 scripts/workflows/cop_fix_publish.py skip-fixed-request \
            --output-dir "$REQUEST_DIR" \
            --cop "${{ github.event.inputs.cop }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --backend-input "${{ github.event.inputs.backend }}" \
            --mode "${{ github.event.inputs.mode }}"

      - name: Publish skip remotely
        if: steps.task.outputs.code_bugs == '0' && github.event.inputs.issue_number != ''
        uses: ./.github/actions/run-repo-write-remote
        with:
          control_repo_token: ${{ steps.bot-control-token.outputs.token }}
          target_sha: ${{ github.sha }}
          target_ref: refs/heads/main
          request_file: ${{ runner.temp }}/cop-fix-skip-request/request.json

      - name: Build remote claim request
        if: steps.task.outputs.code_bugs != '0'
        run: |
          git fetch origin main
          REQUEST_DIR="$RUNNER_TEMP/cop-fix-claim-request"
          python3 scripts/workflows/cop_fix_publish.py claim-request \
            --output-dir "$REQUEST_DIR" \
            --cop "${{ github.event.inputs.cop }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --branch "${{ steps.init.outputs.branch }}" \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            --backend-label "${{ steps.selected_backend.outputs.display_label }}" \
            --model-label "${{ steps.backend.outputs.model_label }}" \
            --backend-reason "${{ steps.selected_backend.outputs.reason }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --code-bugs "${{ steps.task.outputs.code_bugs }}" \
            --tokens "${{ steps.task.outputs.tokens }}" \
            --task-file "$TASK_FILE" \
            >> "$GITHUB_OUTPUT"
          echo "target_sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

      - name: Claim PR remotely
        if: steps.task.outputs.code_bugs != '0'
        uses: ./.github/actions/run-repo-write-remote
        with:
          control_repo_token: ${{ steps.bot-control-token.outputs.token }}
          target_sha: ${{ steps.claim_request.outputs.target_sha }}
          target_ref: refs/heads/main
          request_file: ${{ runner.temp }}/cop-fix-claim-request/request.json

      - name: Resolve claimed PR
        if: steps.task.outputs.code_bugs != '0'
        id: claim
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          PR_JSON=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --head "${{ steps.init.outputs.branch }}" \
            --json number,url --jq '.[0]')
          PR_URL=$(printf '%s' "$PR_JSON" | jq -r '.url // empty')
          if [ -z "$PR_URL" ]; then
            echo "::error::Remote claim did not leave an open PR on branch ${{ steps.init.outputs.branch }}"
            exit 1
          fi
          PR_NUMBER=$(printf '%s' "$PR_JSON" | jq -r '.number')
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        if: steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py build-prompt \
            --cop "${{ github.event.inputs.cop }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --extra-context "${{ github.event.inputs.extra_context }}" \
            --filter "${{ steps.init.outputs.filter }}"

      # --- Wait for main to be healthy right before agent starts ---
      - name: Wait for healthy main
        if: steps.task.outputs.code_bugs != '0'
        env:
          GH_TOKEN: ${{ steps.actions-read-token.outputs.token }}
        run: python3 scripts/workflows/wait_healthy_main.py --repo "${{ github.repository }}"

      # --- Prepare agent ---

      - name: Prepare agent
        if: steps.task.outputs.code_bugs != '0'
        id: prepare
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py prepare-branch \
            --branch "${{ steps.init.outputs.branch }}" \
            --cop "${{ github.event.inputs.cop }}" \
            --filter "${{ steps.init.outputs.filter }}" \
            >> "$GITHUB_OUTPUT"

      # --- Install + run agent ---

      - name: Run agent
        if: steps.task.outputs.code_bugs != '0'
        id: agent
        uses: ./.github/actions/run-agent-remote
        timeout-minutes: 50
        with:
          backend: ${{ steps.selected_backend.outputs.backend }}
          control_repo_token: ${{ steps.bot-control-token.outputs.token }}
          target_sha: ${{ steps.prepare.outputs.branch_base_sha }}
          target_ref: refs/heads/main
          base_sha: ${{ steps.prepare.outputs.branch_base_sha }}
          workflow: agent-cop-fix
          diff_paths: 'src/cop/ tests/fixtures/cops/ bench/corpus/'
          setup_profile: nitrocop
          setup_config_json: >-
            {"rust_components":"rustfmt","install_vendor_gems":true,"install_python":true,"cargo_linker":"clang","rustflags":"-C link-arg=-fuse-ld=mold"}

      # --- Post-agent ---

      - name: Generate summary
        if: always() && steps.task.outputs.code_bugs != '0'
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py snapshot \
            --base-sha "${{ steps.prepare.outputs.branch_base_sha }}" \
            --cop "${{ github.event.inputs.cop }}" \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-number "${{ github.run_number }}"

      - name: Publish summary
        if: always() && steps.task.outputs.code_bugs != '0' && steps.agent.outputs.leak_scan_ok == 'true'
        run: |
          cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload agent log
        if: always() && steps.task.outputs.code_bugs != '0' && steps.agent.outputs.leak_scan_ok == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: agent-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.agent.outputs.artifact_paths }}
          retention-days: 7

      # --- Validate + PR ---

      - name: Finalize PR
        if: steps.task.outputs.code_bugs != '0'
        id: finalize
        run: |
          python3 scripts/workflows/cop_fix_lifecycle.py finalize \
            --cop "${{ github.event.inputs.cop }}" \
            --branch "${{ steps.init.outputs.branch }}" \
            --base-sha "${{ steps.prepare.outputs.branch_base_sha }}" \
            --pr-url "${{ steps.claim.outputs.pr_url }}" \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            --backend-label "${{ steps.selected_backend.outputs.display_label }}" \
            --model-label "${{ steps.backend.outputs.model_label }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-number "${{ github.run_number }}" \
            --tokens "${{ steps.task.outputs.tokens }}" \
            >> "$GITHUB_OUTPUT"

      - name: Build finalize publish request
        if: steps.task.outputs.code_bugs != '0'
        run: |
          REQUEST_DIR="$RUNNER_TEMP/cop-fix-finalize-request"
          python3 scripts/workflows/cop_fix_publish.py finalize-request \
            --output-dir "$REQUEST_DIR" \
            --repo-root "$PWD" \
            --result "${{ steps.finalize.outputs.result }}" \
            --cop "${{ github.event.inputs.cop }}" \
            --backend "${{ steps.selected_backend.outputs.backend }}" \
            --backend-label "${{ steps.selected_backend.outputs.display_label }}" \
            --model-label "${{ steps.backend.outputs.model_label }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --base-sha "${{ steps.prepare.outputs.branch_base_sha }}" \
            --pr-url "${{ steps.claim.outputs.pr_url }}" \
            --pr-number "${{ steps.claim.outputs.pr_number }}" \
            --pr-body-file "$PR_BODY_FILE" \
            --scope-report-file "$AGENT_SCOPE_REPORT_FILE"

      - name: Publish finalize remotely
        if: steps.task.outputs.code_bugs != '0'
        uses: ./.github/actions/run-repo-write-remote
        with:
          control_repo_token: ${{ steps.bot-control-token.outputs.token }}
          target_sha: ${{ steps.prepare.outputs.branch_base_sha }}
          target_ref: refs/heads/${{ steps.init.outputs.branch }}
          request_file: ${{ runner.temp }}/cop-fix-finalize-request/request.json

      # --- Cleanup: close draft PR if agent failed ---

      - name: Close draft PR on failure
        if: failure() && steps.claim.outputs.pr_url
        run: |
          REQUEST_DIR="$RUNNER_TEMP/cop-fix-cleanup-request"
          python3 scripts/workflows/cop_fix_publish.py cleanup-request \
            --output-dir "$REQUEST_DIR" \
            --cop "${{ github.event.inputs.cop }}" \
            --pr "${{ steps.claim.outputs.pr_url }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --backend-label "${{ steps.selected_backend.outputs.display_label || github.event.inputs.backend }}" \
            --model-label "${{ steps.backend.outputs.model_label || 'n/a' }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Publish cleanup remotely
        if: failure() && steps.claim.outputs.pr_url
        uses: ./.github/actions/run-repo-write-remote
        with:
          control_repo_token: ${{ steps.bot-control-token.outputs.token }}
          target_sha: ${{ github.sha }}
          target_ref: refs/heads/main
          request_file: ${{ runner.temp }}/cop-fix-cleanup-request/request.json

      - name: Comment linked issue on failure before PR claim
        if: failure() && !steps.claim.outputs.pr_url && github.event.inputs.issue_number != ''
        run: |
          REQUEST_DIR="$RUNNER_TEMP/cop-fix-preclaim-failure-request"
          python3 scripts/workflows/cop_fix_publish.py cleanup-request \
            --output-dir "$REQUEST_DIR" \
            --cop "${{ github.event.inputs.cop }}" \
            --issue-number "${{ github.event.inputs.issue_number }}" \
            --backend-label "${{ github.event.inputs.backend }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Publish pre-claim failure remotely
        if: failure() && !steps.claim.outputs.pr_url && github.event.inputs.issue_number != ''
        uses: ./.github/actions/run-repo-write-remote
        with:
          control_repo_token: ${{ steps.bot-control-token.outputs.token }}
          target_sha: ${{ github.sha }}
          target_ref: refs/heads/main
          request_file: ${{ runner.temp }}/cop-fix-preclaim-failure-request/request.json
