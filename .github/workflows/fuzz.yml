name: Fuzz

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "fuzz/**"
      - ".github/workflows/fuzz.yml"
      - "src/cop/style/documentation.rs"
      - "src/cop/style/documentation_method.rs"
      - "src/parse/directives.rs"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_annotation_comment
          - fuzz_directive_parsing
          - fuzz_parse_source
          - fuzz_all_cops
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz -> target

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzzer — ${{ matrix.target }}
        run: |
          cd fuzz
          # Use checked-in seeds if available (regression inputs from prior crashes)
          SEEDS_DIR="seeds/${{ matrix.target }}"
          SEEDS_ARG=""
          if [ -d "$SEEDS_DIR" ]; then
            SEEDS_ARG="$SEEDS_DIR"
          fi
          cargo +nightly fuzz run ${{ matrix.target }} $SEEDS_ARG -- \
            -max_total_time=300 \
            -max_len=4096
