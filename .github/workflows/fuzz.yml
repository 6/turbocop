name: Fuzz

on:
  schedule:
    # Nightly at 04:00 UTC
    - cron: "30 4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  fuzz:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_annotation_comment
          - fuzz_directive_parsing
          - fuzz_parse_source
          - fuzz_all_cops
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz -> target

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzzer — ${{ matrix.target }}
        id: fuzz
        run: |
          cd fuzz
          SEEDS_DIR="seeds/${{ matrix.target }}"
          SEEDS_ARG=""
          if [ -d "$SEEDS_DIR" ]; then
            SEEDS_ARG="$SEEDS_DIR"
          fi
          # Nightly run: 30 minutes per target
          if cargo +nightly fuzz run ${{ matrix.target }} $SEEDS_ARG -- \
            -max_total_time=1800 \
            -max_len=4096; then
            echo "found_crash=false" >> "$GITHUB_OUTPUT"
          else
            echo "found_crash=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect crash artifacts
        if: steps.fuzz.outputs.found_crash == 'true'
        id: collect
        run: |
          CRASH_DIR="fuzz/artifacts/${{ matrix.target }}"
          SEEDS_DIR="fuzz/seeds/${{ matrix.target }}"
          mkdir -p "$SEEDS_DIR"

          if [ -d "$CRASH_DIR" ] && [ "$(ls -A "$CRASH_DIR" 2>/dev/null)" ]; then
            cp "$CRASH_DIR"/* "$SEEDS_DIR"/
            echo "has_new_seeds=true" >> "$GITHUB_OUTPUT"
            echo "Collected $(ls "$CRASH_DIR" | wc -l) crash inputs"
          else
            echo "has_new_seeds=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.collect.outputs.has_new_seeds == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Open PR with crash seeds
        if: steps.collect.outputs.has_new_seeds == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BRANCH="fuzz/crash-${{ matrix.target }}-$(date +%Y%m%d)"
          COMMIT_MSG="Add fuzz crash seeds for ${{ matrix.target }}"

          python3 scripts/workflows/workflow_git.py configure \
            --repo "${{ github.repository }}" \
            --identity github-actions \
            --unset-extraheader

          git checkout -B "$BRANCH"
          git add fuzz/seeds/
          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH" --force

          python3 scripts/workflows/workflow_git.py promote \
            --repo "${{ github.repository }}" \
            --branch "$BRANCH" \
            --message "$COMMIT_MSG"

          CRASH_LIST=$(ls fuzz/artifacts/${{ matrix.target }}/ 2>/dev/null | head -20)
          PR_BODY=$(cat <<EOF
          ## Fuzz crashes found

          The nightly fuzz run found crashing inputs for \`${{ matrix.target }}\`.

          **Crash artifacts:**
          \`\`\`
          ${CRASH_LIST}
          \`\`\`

          These inputs have been added to \`fuzz/seeds/${{ matrix.target }}/\` so they serve as regression tests once the underlying bugs are fixed.

          [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )

          gh pr create \
            --title "Fuzz: crashes found in ${{ matrix.target }}" \
            --body "$PR_BODY" \
            --head "$BRANCH" \
            --base main
