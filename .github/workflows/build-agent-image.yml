name: Build Agent Image

on:
  schedule:
    - cron: '0 4 * * 0'  # Sunday 04:00 UTC
  push:
    branches: [main]
    paths:
      - 'Dockerfile.agent'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'mise.toml'
      - 'bench/corpus/Gemfile*'
      - 'vendor/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/agent

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
