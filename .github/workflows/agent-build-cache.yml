name: Agent Build Cache

# Build and upload the test binary cache for Kilo agents.
# Run this once before dispatching a batch of cops.
# Subsequent dispatches reuse the cached build.

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build test binary
        run: cargo test --lib --no-run 2>&1

      - name: Package build cache
        run: |
          SHA=$(git rev-parse --short HEAD)
          FILENAME="agent-build-cache-${SHA}.tar.gz"
          tar czf "/tmp/${FILENAME}" \
            -C target/debug \
            deps/ \
            build/ \
            incremental/ \
            .fingerprint/ \
            $(cd target/debug && ls nitrocop-* 2>/dev/null || true)
          ls -lh "/tmp/${FILENAME}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="agent-build-cache"
          SHA="${{ steps.package.outputs.sha }}"
          FILENAME="${{ steps.package.outputs.filename }}"

          gh release view "$TAG" &>/dev/null || \
            gh release create "$TAG" --title "Agent Build Cache" \
              --notes "Pre-built target/debug cache for Kilo agents." \
              --prerelease

          gh release upload "$TAG" "/tmp/${FILENAME}" --clobber

          # Also upload a marker file so the setup script knows the latest SHA
          echo "$SHA" > /tmp/latest-sha.txt
          gh release upload "$TAG" /tmp/latest-sha.txt --clobber
          echo "Uploaded cache for $SHA at $(date)"
