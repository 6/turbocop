name: Corpus Oracle

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: corpus-${{ github.ref }}
  cancel-in-progress: true

on:
  # Manual trigger only — corpus oracle runs against thousands of repos
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Run only this repo ID (e.g. 'multi_json__multi_json__c5fa9fc'), or 'all'"
        default: "all"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build nitrocop release binary ──────────────────────────────
  build-nitrocop:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v6
        with:
          name: nitrocop-binary
          path: target/release/nitrocop
          retention-days: 1

  # ── Compute matrix (batched, N repos per job) ──────────────────
  compute-matrix:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate matrix
        id: matrix
        run: python3 bench/corpus/oracle_runner.py compute-matrix --batch-size 30
        env:
          REPO_FILTER: ${{ github.event.inputs.repo_filter || 'all' }}

  # ── Run oracle on each batch of repos ────────────────────────────
  oracle-repo:
    needs: [build-nitrocop, compute-matrix]
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.compute-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download nitrocop binary
        uses: actions/download-artifact@v8
        with:
          name: nitrocop-binary
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/nitrocop

      # Ruby version read from mise.toml
      - uses: ruby/setup-ruby@v1

      - name: Cache baseline bundle
        uses: actions/cache@v5
        with:
          path: bench/corpus/vendor/bundle
          key: corpus-bundle-${{ hashFiles('bench/corpus/Gemfile') }}

      - name: Install baseline gems
        run: |
          cd bench/corpus
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Export nitrocop cop list
        run: bin/nitrocop --list-cops > nitrocop-cops.txt

      - name: Compute rubocop cache keys
        id: rubocop-cache-key
        run: |
          # Rubocop results are deterministic for a given (repo SHA, rubocop version, config).
          # Cache key = hash of Gemfile + config + parser crash patch.
          RESCUE_FILE="bench/corpus/rescue_parser_crashes.rb"
          EXTRA_HASH=""
          if [ -f "$RESCUE_FILE" ]; then
            EXTRA_HASH="$(sha256sum "$RESCUE_FILE" | cut -c1-16)"
          fi
          KEY_HASH=$(echo "${EXTRA_HASH}" | cat - bench/corpus/Gemfile bench/corpus/baseline_rubocop.yml | sha256sum | cut -c1-16)
          echo "hash=${KEY_HASH}" >> "$GITHUB_OUTPUT"

      - name: Restore cached rubocop results
        uses: actions/cache/restore@v5
        id: rubocop-cache
        with:
          path: rubocop-cache/
          # Restore the consolidated cache from the previous collect-results job.
          # This contains ALL repos' rubocop results, so batch composition changes
          # (including batch size changes) don't cause cold caches.
          # Falls back to any per-batch cache if no consolidated cache exists yet.
          key: rubocop-all-${{ steps.rubocop-cache-key.outputs.hash }}-dummy
          restore-keys: |
            rubocop-all-${{ steps.rubocop-cache-key.outputs.hash }}-
            rubocop-${{ steps.rubocop-cache-key.outputs.hash }}-

      - name: Compute batch repos
        id: batch-repos
        env:
          REPO_FILTER: ${{ github.event.inputs.repo_filter || 'all' }}
        run: |
          python3 bench/corpus/oracle_runner.py compute-batch-repos \
            --batch-id ${{ matrix.batch_id }} \
            --batch-size 30

      - name: Pre-clone repos (parallel)
        run: |
          # Uses shared clone script — identical to check-cop's clone path
          REPO_IDS=$(jq -r '.[].id' batch_repos.json | paste -sd,)
          python3 bench/corpus/clone_repos.py \
            --dest . \
            --manifest bench/corpus/manifest.jsonl \
            --repo-ids "$REPO_IDS" \
            --parallel 3

      - name: Run batch
        id: run-batch
        run: |
          mkdir -p results/nitrocop results/rubocop rubocop-cache

          while IFS= read -r row; do
            REPO_ID=$(echo "$row" | jq -r '.id')
            REPO_URL=$(echo "$row" | jq -r '.repo_url')
            REPO_SHA=$(echo "$row" | jq -r '.sha')

            echo "::group::${REPO_ID}"

            # Skip repos that failed to clone
            if [ ! -d "repos/${REPO_ID}" ]; then
              echo "Skipping ${REPO_ID} (clone failed)"
              echo "::endgroup::"
              continue
            fi

            DEST="repos/${REPO_ID}"

            RUBOCOP_CACHED=false
            if [ -f "rubocop-cache/${REPO_ID}_${REPO_SHA}.json" ]; then
              echo "Using cached rubocop result for ${REPO_ID}"
              cp "rubocop-cache/${REPO_ID}_${REPO_SHA}.json" "results/rubocop/${REPO_ID}.json"
              RUBOCOP_CACHED=true
            fi

            # Per-repo timeout (15 min each tool).
            # Keeps one slow repo from killing the whole batch.
            REPO_TIMEOUT=900  # 15 minutes

            WORKSPACE="$PWD"
            ABS_DEST="$(cd "$DEST" && pwd)"
            BASELINE_CONFIG="$WORKSPACE/bench/corpus/baseline_rubocop.yml"

            python3 bench/corpus/oracle_runner.py delete-crash-files --repo-id "$REPO_ID" --repo-dir "$ABS_DEST"

            # Both tools run from inside the repo dir so base_dir = repo root.
            # GIT_CEILING_DIRECTORIES prevents walking up to parent git trees.

            # nitrocop
            echo "=== nitrocop: ${REPO_ID} ==="
            rc=0
            python3 bench/corpus/run_nitrocop.py "$ABS_DEST" \
              --binary "$WORKSPACE/bin/nitrocop" \
              --timeout "${REPO_TIMEOUT}" \
              --cwd "$ABS_DEST" \
              --output "$WORKSPACE/results/nitrocop/${REPO_ID}.json" \
              2>"$WORKSPACE/results/nitrocop/${REPO_ID}.err" || rc=$?

            if [ "$rc" -eq 124 ]; then
              echo "::warning::nitrocop timed out after ${REPO_TIMEOUT}s for ${REPO_ID}"
            fi

            # rubocop — skip if we have a cached result
            if [ "$RUBOCOP_CACHED" = false ]; then
              echo "=== rubocop: ${REPO_ID} ==="
              rc=0
              (cd "$ABS_DEST" && timeout "${REPO_TIMEOUT}" \
              env BUNDLE_GEMFILE=$WORKSPACE/bench/corpus/Gemfile \
                  BUNDLE_PATH=$WORKSPACE/bench/corpus/vendor/bundle \
                  GIT_CEILING_DIRECTORIES=$(dirname "$ABS_DEST") \
              bundle exec rubocop \
                --require $WORKSPACE/bench/corpus/rescue_parser_crashes.rb \
                --config "$BASELINE_CONFIG" \
                --format json \
                --force-exclusion \
                --cache false \
                . \
                > "$WORKSPACE/results/rubocop/${REPO_ID}.json" 2>"$WORKSPACE/results/rubocop/${REPO_ID}.err") || rc=$?

              if [ "$rc" -eq 124 ]; then
                echo "::warning::rubocop timed out after ${REPO_TIMEOUT}s for ${REPO_ID}"
              fi
            fi

            # Resolve symlink paths and extract source context while repo is on disk
            python3 bench/corpus/oracle_runner.py resolve-symlinks \
              "results/nitrocop/${REPO_ID}.json" \
              "results/rubocop/${REPO_ID}.json" \
              2>/dev/null || true
            python3 bench/corpus/oracle_runner.py extract-context \
              --nitrocop-json "results/nitrocop/${REPO_ID}.json" \
              --rubocop-json "results/rubocop/${REPO_ID}.json" \
              --repo-dir "$DEST" \
              --output "results/context/${REPO_ID}.json" \
              2>/dev/null || true

            # Validate and cache rubocop result
            if [ "$RUBOCOP_CACHED" = false ] && [ -f "results/rubocop/${REPO_ID}.json" ]; then
              if python3 bench/corpus/oracle_runner.py validate-rubocop "results/rubocop/${REPO_ID}.json" "$ABS_DEST"; then
                cp "results/rubocop/${REPO_ID}.json" "rubocop-cache/${REPO_ID}_${REPO_SHA}.json"
              else
                echo "::warning::Rubocop result for ${REPO_ID} contains out-of-repo paths — not caching"
              fi
            fi

            # Free disk space between repos
            rm -rf "$DEST"

            echo "::endgroup::"
          done < <(jq -c '.[]' batch_repos.json)

      - name: Save rubocop results cache
        uses: actions/cache/save@v5
        if: steps.run-batch.conclusion == 'success'
        with:
          path: rubocop-cache/
          key: rubocop-${{ steps.rubocop-cache-key.outputs.hash }}-${{ matrix.batch_hash }}

      - name: Upload results
        uses: actions/upload-artifact@v6
        with:
          name: corpus-results-${{ matrix.batch_id }}
          path: |
            results/
            nitrocop-cops.txt
          retention-days: 7
          include-hidden-files: false

  # ── Run synthetic benchmark (parallel with corpus batches) ────
  run-synthetic:
    needs: [build-nitrocop]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Download nitrocop binary
        uses: actions/download-artifact@v8
        with:
          name: nitrocop-binary
          path: bin/

      - name: Make binary executable
        run: chmod +x bin/nitrocop

      - uses: ruby/setup-ruby@v1

      - name: Cache synthetic bundle
        uses: actions/cache@v5
        with:
          path: bench/synthetic/vendor/bundle
          key: synthetic-bundle-${{ hashFiles('bench/synthetic/Gemfile') }}

      - name: Install synthetic gems
        run: |
          cd bench/synthetic
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Run synthetic benchmark
        run: |
          # run_synthetic.py expects the binary at target/release/nitrocop
          mkdir -p target/release
          cp bin/nitrocop target/release/nitrocop
          python3 bench/synthetic/run_synthetic.py --verbose

      - name: Upload synthetic results
        uses: actions/upload-artifact@v6
        with:
          name: synthetic-results
          path: bench/synthetic/synthetic-results.json
          retention-days: 7

  # ── Collect and diff all results ───────────────────────────────
  collect-results:
    needs: [oracle-repo, run-synthetic]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Free disk space
        run: |
          # Remove pre-installed tools we don't need (~8GB).
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          df -h / | tail -1

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Download all results
        uses: actions/download-artifact@v8
        with:
          pattern: corpus-results-*
          path: all-results/
          merge-multiple: true

      - name: Download synthetic results
        uses: actions/download-artifact@v8
        with:
          name: synthetic-results
          path: synthetic-dl/

      - name: Place synthetic results
        run: cp synthetic-dl/synthetic-results.json bench/synthetic/synthetic-results.json

      - name: Consolidate rubocop cache
        run: |
          python3 bench/corpus/oracle_runner.py consolidate-cache \
            --results-dir all-results/results/rubocop \
            --cache-dir rubocop-cache

      - name: Compute rubocop cache key
        id: rubocop-cache-key
        run: |
          # Same hash as oracle-repo jobs use — must stay in sync
          RESCUE_FILE="bench/corpus/rescue_parser_crashes.rb"
          EXTRA_HASH=""
          if [ -f "$RESCUE_FILE" ]; then
            EXTRA_HASH="$(sha256sum "$RESCUE_FILE" | cut -c1-16)"
          fi
          KEY_HASH=$(echo "${EXTRA_HASH}" | cat - bench/corpus/Gemfile bench/corpus/baseline_rubocop.yml | sha256sum | cut -c1-16)
          echo "hash=${KEY_HASH}" >> "$GITHUB_OUTPUT"

      - name: Save consolidated rubocop cache
        uses: actions/cache/save@v5
        with:
          path: rubocop-cache/
          # Keyed by config hash + run_id so each successful run creates a fresh
          # consolidated cache. Batch jobs restore via restore-keys prefix match,
          # so they always get the most recent full cache regardless of batch size.
          key: rubocop-all-${{ steps.rubocop-cache-key.outputs.hash }}-${{ github.run_id }}

      - name: Diff and generate report
        run: |
          # Cop list is uploaded alongside results from any repo job
          COP_LIST=$(find all-results -name nitrocop-cops.txt -print -quit)
          # Context dir may not exist if all repos failed context extraction
          CONTEXT_DIR=""
          if [ -d "all-results/results/context" ]; then
            CONTEXT_DIR="--context-dir all-results/results/context"
          fi
          python3 bench/corpus/diff_results.py \
            --nitrocop-dir all-results/results/nitrocop \
            --rubocop-dir all-results/results/rubocop \
            --manifest bench/corpus/manifest.jsonl \
            --output-json corpus-results.json \
            --output-md corpus-results.md \
            ${COP_LIST:+--cop-list "$COP_LIST"} \
            $CONTEXT_DIR

      - name: Generate tiers.json
        run: |
          python3 bench/corpus/gen_tiers.py \
            --input corpus-results.json \
            --synthetic bench/synthetic/synthetic-results.json \
            --output tiers.json

      - name: Update README conformance
        run: |
          python3 bench/corpus/update_readme.py \
            --input corpus-results.json \
            --synthetic bench/synthetic/synthetic-results.json \
            --manifest bench/corpus/manifest.jsonl \
            --readme README.md

      - name: Print summary
        run: |
          cat corpus-results.md
          # Step summary has a 1024k limit; keep just the top tables
          head -c 128000 corpus-results.md >> "$GITHUB_STEP_SUMMARY" || true

      - name: Update corpus report
        run: cp corpus-results.md docs/corpus.md

      - name: Generate cop coverage report
        run: |
          SYNTH_ARG=""
          if [ -f bench/synthetic/synthetic-results.json ]; then
            SYNTH_ARG="--synthetic bench/synthetic/synthetic-results.json"
          fi
          python3 scripts/cop_coverage.py --input corpus-results.json $SYNTH_ARG > docs/cop_coverage.md

      - name: Upload report
        uses: actions/upload-artifact@v6
        with:
          name: corpus-report
          path: |
            corpus-results.json
            corpus-results.md
            tiers.json
            bench/synthetic/synthetic-results.json
            docs/corpus.md
            docs/cop_coverage.md
          retention-days: 30

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Open PR if tiers, README, or corpus report changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          CHANGED=false

          if ! diff -q tiers.json src/resources/tiers.json >/dev/null 2>&1; then
            CHANGED=true
          fi
          if ! git diff --quiet README.md; then
            CHANGED=true
          fi
          if ! git diff --quiet docs/corpus.md; then
            CHANGED=true
          fi
          if ! git diff --quiet docs/cop_coverage.md 2>/dev/null || \
             ! git ls-files --error-unmatch docs/cop_coverage.md >/dev/null 2>&1; then
            CHANGED=true
          fi

          if [ "$CHANGED" = false ]; then
            echo "No changes to commit"
            exit 0
          fi

          BRANCH="corpus-oracle/update-$(date +%s)"
          python3 scripts/workflows/workflow_git.py configure \
            --repo "${{ github.repository }}" \
            --unset-extraheader
          git checkout -B "$BRANCH"

          if ! diff -q tiers.json src/resources/tiers.json >/dev/null 2>&1; then
            cp tiers.json src/resources/tiers.json
            git add src/resources/tiers.json
          fi
          git add -f README.md docs/corpus.md docs/cop_coverage.md

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_META=$(python3 scripts/workflows/render_corpus_oracle_pr.py \
            --repo-root . \
            --repo-filter "${{ github.event.inputs.repo_filter || 'all' }}" \
            --run-number "${{ github.run_number }}" \
            --run-url "$RUN_URL")
          COMMIT_MSG=$(printf '%s' "$PR_META" | jq -r '.commit_message')
          PR_TITLE=$(printf '%s' "$PR_META" | jq -r '.pr_title')
          PR_BODY_FILE=$(mktemp)
          printf '%s' "$PR_META" | jq -r '.pr_body' > "$PR_BODY_FILE"

          git commit -m "$COMMIT_MSG"
          git push origin "$BRANCH" --force
          python3 scripts/workflows/workflow_git.py promote \
            --repo "${{ github.repository }}" \
            --branch "$BRANCH" \
            --message "$COMMIT_MSG"

          gh pr create \
              --title "$PR_TITLE" \
              --body-file "$PR_BODY_FILE" \
              --head "$BRANCH" \
              --base main
