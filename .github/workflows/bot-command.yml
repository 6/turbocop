name: Bot Trigger
run-name: bot-trigger ${{ inputs.request_id }}

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: Unique request identifier for tracking
        required: true
        type: string
      source_repo:
        description: Source repository (owner/name)
        required: true
        type: string
      payload:
        description: Full JSON webhook payload from 6/bot
        required: true
        type: string

concurrency:
  group: bot-trigger-${{ inputs.request_id }}
  cancel-in-progress: false

jobs:
  route:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve bot trigger
        id: command
        env:
          INPUT_PAYLOAD: ${{ inputs.payload }}
        run: |
          if [ "${{ inputs.source_repo }}" != "${{ github.repository }}" ]; then
            echo "::error::source_repo input must match the target repository"
            exit 1
          fi
          python3 scripts/workflows/bot_command.py route \
            --repo "${{ github.repository }}" \
            --payload-json "$INPUT_PAYLOAD" \
            >> "$GITHUB_OUTPUT"

      - name: Comment unsupported pull request trigger
        if: steps.command.outputs.action == 'comment_only' && steps.command.outputs.subject_kind == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE="$RUNNER_TEMP/bot-command-not-started.md"
          cat > "$BODY_FILE" <<EOF
          ## Bot request not started

          - Reason: ${{ steps.command.outputs.reason }}
          - Requested by: @${{ steps.command.outputs.requested_by }}
          - Trigger: ${{ steps.command.outputs.trigger_summary }}
          EOF
          if [ -n "${{ steps.command.outputs.request_url }}" ]; then
            echo "- Request: ${{ steps.command.outputs.request_url }}" >> "$BODY_FILE"
          fi
          gh pr comment "${{ steps.command.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$BODY_FILE"

      - name: Comment unsupported issue trigger
        if: steps.command.outputs.action == 'comment_only' && steps.command.outputs.subject_kind == 'issue'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE="$RUNNER_TEMP/bot-command-not-started.md"
          cat > "$BODY_FILE" <<EOF
          ## Bot request not started

          - Reason: ${{ steps.command.outputs.reason }}
          - Requested by: @${{ steps.command.outputs.requested_by }}
          - Trigger: ${{ steps.command.outputs.trigger_summary }}
          EOF
          if [ -n "${{ steps.command.outputs.request_url }}" ]; then
            echo "- Request: ${{ steps.command.outputs.request_url }}" >> "$BODY_FILE"
          fi
          gh issue comment "${{ steps.command.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$BODY_FILE"

      - name: Resolve failed Checks run for repair
        if: steps.command.outputs.action == 'repair_pr'
        id: repair
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/workflows/bot_command.py resolve-repair \
            --repo "${{ github.repository }}" \
            --pr-number "${{ steps.command.outputs.pr_number }}" \
            >> "$GITHUB_OUTPUT"

      - name: Resolve cop tracker issue for fix
        if: steps.command.outputs.action == 'fix_issue'
        id: fix
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/workflows/bot_command.py resolve-fix \
            --repo "${{ github.repository }}" \
            --issue-number "${{ steps.command.outputs.issue_number }}" \
            >> "$GITHUB_OUTPUT"

      - name: Comment when repair is not dispatchable
        if: steps.command.outputs.action == 'repair_pr' && steps.repair.outputs.should_dispatch != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE="$RUNNER_TEMP/bot-repair-not-started.md"
          cat > "$BODY_FILE" <<EOF
          ## Bot repair not started

          - Reason: ${{ steps.repair.outputs.reason }}
          - Requested by: @${{ steps.command.outputs.requested_by }}
          - Trigger: ${{ steps.command.outputs.trigger_summary }}
          EOF
          if [ -n "${{ steps.command.outputs.request_url }}" ]; then
            echo "- Request: ${{ steps.command.outputs.request_url }}" >> "$BODY_FILE"
          fi
          gh pr comment "${{ steps.command.outputs.pr_number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$BODY_FILE"

      - name: Comment when fix is not dispatchable
        if: steps.command.outputs.action == 'fix_issue' && steps.fix.outputs.should_dispatch != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY_FILE="$RUNNER_TEMP/bot-fix-not-started.md"
          cat > "$BODY_FILE" <<EOF
          ## Bot fix not started

          - Reason: ${{ steps.fix.outputs.reason }}
          - Requested by: @${{ steps.command.outputs.requested_by }}
          - Trigger: ${{ steps.command.outputs.trigger_summary }}
          EOF
          if [ -n "${{ steps.command.outputs.request_url }}" ]; then
            echo "- Request: ${{ steps.command.outputs.request_url }}" >> "$BODY_FILE"
          fi
          gh issue comment "${{ steps.command.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --body-file "$BODY_FILE"

      - name: Dispatch agent PR repair
        if: steps.command.outputs.action == 'repair_pr' && steps.repair.outputs.should_dispatch == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.command.outputs.pr_number }}
          CHECKS_RUN_ID: ${{ steps.repair.outputs.checks_run_id }}
          REQUESTED_BY: ${{ steps.command.outputs.requested_by }}
          REQUEST_URL: ${{ steps.command.outputs.request_url }}
          PROMPT_TEXT: ${{ steps.command.outputs.prompt_text }}
          TRIGGER_SUMMARY: ${{ steps.command.outputs.trigger_summary }}
        run: |
          PAYLOAD_FILE="$RUNNER_TEMP/agent-pr-repair-dispatch.json"
          python3 - <<'PY' > "$PAYLOAD_FILE"
          import json
          import os

          requested_by = os.environ["REQUESTED_BY"]
          request_url = os.environ["REQUEST_URL"].strip()
          prompt_text = os.environ["PROMPT_TEXT"].strip()
          trigger_summary = os.environ["TRIGGER_SUMMARY"]

          extra_lines = [
              f"Requested by @{requested_by} via {trigger_summary}.",
          ]
          if request_url:
              extra_lines.append(f"Trigger URL: {request_url}")
          if prompt_text:
              extra_lines.append("")
              extra_lines.append(prompt_text)

          payload = {
              "ref": "main",
              "inputs": {
                  "pr_number": os.environ["PR_NUMBER"],
                  "checks_run_id": os.environ["CHECKS_RUN_ID"],
                  "backend": "auto",
                  "strength": "auto",
                  "extra_context": "\n".join(extra_lines),
                  "force": "false",
              },
          }
          print(json.dumps(payload))
          PY
          gh api "repos/${{ github.repository }}/actions/workflows/agent-pr-repair.yml/dispatches" \
            --method POST \
            --input "$PAYLOAD_FILE"

      - name: Dispatch agent cop fix
        if: steps.command.outputs.action == 'fix_issue' && steps.fix.outputs.should_dispatch == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          COP: ${{ steps.fix.outputs.cop }}
          ISSUE_NUMBER: ${{ steps.command.outputs.issue_number }}
          REQUESTED_BY: ${{ steps.command.outputs.requested_by }}
          REQUEST_URL: ${{ steps.command.outputs.request_url }}
          PROMPT_TEXT: ${{ steps.command.outputs.prompt_text }}
          TRIGGER_SUMMARY: ${{ steps.command.outputs.trigger_summary }}
        run: |
          PAYLOAD_FILE="$RUNNER_TEMP/agent-cop-fix-dispatch.json"
          python3 - <<'PY' > "$PAYLOAD_FILE"
          import json
          import os

          requested_by = os.environ["REQUESTED_BY"]
          request_url = os.environ["REQUEST_URL"].strip()
          prompt_text = os.environ["PROMPT_TEXT"].strip()
          trigger_summary = os.environ["TRIGGER_SUMMARY"]

          extra_lines = [
              f"Requested by @{requested_by} via {trigger_summary}.",
          ]
          if request_url:
              extra_lines.append(f"Trigger URL: {request_url}")
          if prompt_text:
              extra_lines.append("")
              extra_lines.append(prompt_text)

          payload = {
              "ref": "main",
              "inputs": {
                  "cop": os.environ["COP"],
                  "backend": "auto",
                  "mode": "fix",
                  "issue_number": os.environ["ISSUE_NUMBER"],
                  "extra_context": "\n".join(extra_lines),
              },
          }
          print(json.dumps(payload))
          PY
          gh api "repos/${{ github.repository }}/actions/workflows/agent-cop-fix.yml/dispatches" \
            --method POST \
            --input "$PAYLOAD_FILE"
