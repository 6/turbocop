name: Run Repo Write Remote
description: Dispatch GitHub write-side effects to 6/bot and wait for completion.

inputs:
  control_repo_token:
    description: Token with access to the 6/bot control repo
    required: true
  control_repo:
    description: Control-plane repository
    default: 6/bot
  target_sha:
    description: Exact source-repo commit the remote write should validate against
    required: true
  target_ref:
    description: Trusted branch or tag ref that should contain or equal target_sha
    required: true
  request_file:
    description: Path to the local repo-write request JSON file
    required: true

outputs:
  remote_run_url:
    description: URL of the 6/bot run that executed the write request
    value: ${{ steps.await.outputs.run_url }}
  signed_sha:
    description: Signed commit SHA produced by the remote write, if any
    value: ${{ steps.await.outputs.signed_sha }}
  unsigned_sha:
    description: Unsigned commit SHA produced by the remote write, if any
    value: ${{ steps.await.outputs.unsigned_sha }}

runs:
  using: composite
  steps:
    - name: Compute remote request identifiers
      id: ids
      shell: bash
      run: |
        REQUEST_ID="${{ github.run_id }}-repo-write-${{ github.run_attempt }}-$RANDOM"
        echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "input_artifact=remote-repo-write-input-$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "output_artifact=remote-repo-write-output-$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "input_dir=$RUNNER_TEMP/remote-repo-write-input-$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "download_dir=$RUNNER_TEMP/remote-repo-write-output-$REQUEST_ID" >> "$GITHUB_OUTPUT"

    - name: Prepare remote write input
      shell: bash
      run: |
        python3 scripts/workflows/remote_repo_write_bridge.py prepare-input \
          --request-file "${{ inputs.request_file }}" \
          --output-dir "${{ steps.ids.outputs.input_dir }}"

    - name: Upload remote write input artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.ids.outputs.input_artifact }}
        path: ${{ steps.ids.outputs.input_dir }}
        retention-days: 1

    - name: Dispatch remote write
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.control_repo_token }}
      run: |
        python3 scripts/workflows/remote_repo_write_bridge.py dispatch \
          --control-repo "${{ inputs.control_repo }}" \
          --request-id "${{ steps.ids.outputs.request_id }}" \
          --source-repo "${{ github.repository }}" \
          --source-run-id "${{ github.run_id }}" \
          --input-artifact "${{ steps.ids.outputs.input_artifact }}" \
          --output-artifact "${{ steps.ids.outputs.output_artifact }}" \
          --target-sha "${{ inputs.target_sha }}" \
          --target-ref "${{ inputs.target_ref }}"

    - name: Await remote write output
      id: await
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.control_repo_token }}
      run: |
        python3 scripts/workflows/remote_repo_write_bridge.py await-output \
          --control-repo "${{ inputs.control_repo }}" \
          --request-id "${{ steps.ids.outputs.request_id }}" \
          --output-artifact "${{ steps.ids.outputs.output_artifact }}" \
          --download-dir "${{ steps.ids.outputs.download_dir }}" \
          >> "$GITHUB_OUTPUT"
