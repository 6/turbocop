name: Run Agent Remote
description: Dispatch the secret-bearing agent step to 6/bot and apply the returned patch locally.

inputs:
  backend:
    description: Backend identifier (e.g. claude-normal, minimax, codex-hard)
    required: true
  control_repo_token:
    description: Token with access to the 6/bot control repo
    required: true
  control_repo:
    description: Control-plane repository
    default: 6/bot
  target_sha:
    description: Exact source-repo commit that the remote runner should execute against
    required: true
  target_ref:
    description: Trusted branch or tag ref that should contain target_sha
    required: true
  base_sha:
    description: Git ref to diff against for remote snapshot capture
    required: true
  workflow:
    description: Workflow profile name
    required: true
  diff_paths:
    description: Space-separated path filters for git diff (empty = all files)
    default: ''
  setup_profile:
    description: Optional target-repo setup profile
    default: ''
  setup_config_json:
    description: Optional JSON config for the target-repo setup profile
    default: '{}'

outputs:
  artifact_paths:
    description: Newline-separated artifact paths for upload-artifact
    value: ${{ steps.await.outputs.artifact_paths }}
  leak_scan_ok:
    description: "'true' if the remote runner leak scan passed"
    value: ${{ steps.await.outputs.leak_scan_ok }}
  remote_run_url:
    description: URL of the 6/bot run that executed the agent
    value: ${{ steps.await.outputs.run_url }}

runs:
  using: composite
  steps:
    - name: Compute remote request identifiers
      id: ids
      shell: bash
      run: |
        REQUEST_ID="${{ github.run_id }}-${{ inputs.workflow }}-${{ github.run_attempt }}-$RANDOM"
        echo "request_id=$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "input_artifact=remote-agent-input-$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "output_artifact=remote-agent-output-$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "input_dir=$RUNNER_TEMP/remote-agent-input-$REQUEST_ID" >> "$GITHUB_OUTPUT"
        echo "download_dir=$RUNNER_TEMP/remote-agent-output-$REQUEST_ID" >> "$GITHUB_OUTPUT"

    - name: Prepare remote input
      shell: bash
      run: |
        python3 scripts/workflows/remote_agent_bridge.py prepare-input \
          --output-dir "${{ steps.ids.outputs.input_dir }}"

    - name: Upload remote input artifact
      uses: actions/upload-artifact@v6
      with:
        name: ${{ steps.ids.outputs.input_artifact }}
        path: ${{ steps.ids.outputs.input_dir }}
        retention-days: 1

    - name: Dispatch remote run
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.control_repo_token }}
      run: |
        python3 scripts/workflows/remote_agent_bridge.py dispatch \
          --control-repo "${{ inputs.control_repo }}" \
          --request-id "${{ steps.ids.outputs.request_id }}" \
          --source-repo "${{ github.repository }}" \
          --source-run-id "${{ github.run_id }}" \
          --input-artifact "${{ steps.ids.outputs.input_artifact }}" \
          --output-artifact "${{ steps.ids.outputs.output_artifact }}" \
          --target-sha "${{ inputs.target_sha }}" \
          --target-ref "${{ inputs.target_ref }}" \
          --backend "${{ inputs.backend }}" \
          --base-sha "${{ inputs.base_sha }}" \
          --workflow "${{ inputs.workflow }}" \
          --diff-paths "${{ inputs.diff_paths }}" \
          --setup-profile "${{ inputs.setup_profile }}" \
          --setup-config-json '${{ inputs.setup_config_json }}'

    - name: Await remote output
      id: await
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.control_repo_token }}
      run: |
        python3 scripts/workflows/remote_agent_bridge.py await-output \
          --control-repo "${{ inputs.control_repo }}" \
          --request-id "${{ steps.ids.outputs.request_id }}" \
          --output-artifact "${{ steps.ids.outputs.output_artifact }}" \
          --download-dir "${{ steps.ids.outputs.download_dir }}" \
          --extract-into "$AGENT_RUNTIME_ROOT" \
          >> "$GITHUB_OUTPUT"

        echo "artifact_paths=$AGENT_RUNTIME_ROOT" >> "$GITHUB_OUTPUT"

    - name: Apply remote patch
      shell: bash
      run: |
        if [ -s "$AGENT_RECOVERY_PATCH_FILE" ]; then
          git apply --binary "$AGENT_RECOVERY_PATCH_FILE"
        fi
