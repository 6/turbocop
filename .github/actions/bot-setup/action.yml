name: Bot Setup
description: Standard setup action for the 6/bot remote runner

inputs:
  setup_profile:
    description: Setup profile requested by the control-plane runner
    default: nitrocop
  setup_config_json:
    description: JSON configuration for the selected setup profile
    default: '{}'

runs:
  using: composite
  steps:
    - name: Decode setup config
      id: cfg
      shell: bash
      env:
        SETUP_PROFILE: ${{ inputs.setup_profile }}
        SETUP_CONFIG_JSON: ${{ inputs.setup_config_json }}
      run: |
        python3 - <<'PY' >> "$GITHUB_OUTPUT"
        import json
        import os

        profile = os.environ["SETUP_PROFILE"].strip() or "nitrocop"
        if profile != "nitrocop":
            raise SystemExit(f"unsupported setup_profile: {profile}")

        config = json.loads(os.environ["SETUP_CONFIG_JSON"] or "{}")
        rust_components = str(config.get("rust_components", "rustfmt"))
        install_vendor_gems = "true" if config.get("install_vendor_gems", False) else "false"
        install_python = "true" if config.get("install_python", True) else "false"
        cargo_linker = str(config.get("cargo_linker", ""))
        rustflags = str(config.get("rustflags", ""))

        print(f"rust_components={rust_components}")
        print(f"install_vendor_gems={install_vendor_gems}")
        print(f"install_python={install_python}")
        print(f"cargo_linker={cargo_linker}")
        print(f"rustflags={rustflags}")
        PY

    - name: Export nitrocop build env
      shell: bash
      run: |
        if [ -n "${{ steps.cfg.outputs.cargo_linker }}" ]; then
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=${{ steps.cfg.outputs.cargo_linker }}" >> "$GITHUB_ENV"
        fi
        if [ -n "${{ steps.cfg.outputs.rustflags }}" ]; then
          echo "RUSTFLAGS=${{ steps.cfg.outputs.rustflags }}" >> "$GITHUB_ENV"
        fi

    - uses: dtolnay/rust-toolchain@stable
      with:
        rust_components: ${{ steps.cfg.outputs.rust_components }}

    - uses: Swatinem/rust-cache@v2

    - name: Install mold linker
      shell: bash
      run: sudo apt-get update -qq && sudo apt-get install -y -qq mold

    - uses: ruby/setup-ruby@v1
      with:
        ruby-version: '4.0'
        bundler-cache: false

    - name: Install vendor RuboCop gems
      if: steps.cfg.outputs.install_vendor_gems == 'true'
      shell: bash
      run: |
        V_RC=$(cd vendor/rubocop && git describe --tags --abbrev=0 | sed 's/^v//')
        V_PERF=$(cd vendor/rubocop-performance && git describe --tags --abbrev=0 | sed 's/^v//')
        V_RAILS=$(cd vendor/rubocop-rails && git describe --tags --abbrev=0 | sed 's/^v//')
        V_RSPEC=$(cd vendor/rubocop-rspec && git describe --tags --abbrev=0 | sed 's/^v//')
        gem install "rubocop:$V_RC" "rubocop-performance:$V_PERF" \
          "rubocop-rails:$V_RAILS" "rubocop-rspec:$V_RSPEC" prism --no-document

    - uses: astral-sh/setup-uv@v6
      if: steps.cfg.outputs.install_python == 'true'

    - name: Install Python deps
      if: steps.cfg.outputs.install_python == 'true'
      shell: bash
      run: uv sync --frozen

    - name: Install corpus bundle
      shell: bash
      run: |
        cd bench/corpus
        bundle config set --local path vendor/bundle
        bundle install --jobs 4 --retry 3
